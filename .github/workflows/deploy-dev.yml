name: Terraform Deploy (dev)

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    uses: h-katabami/CICD-Repository/.github/workflows/reusable-terraform-deploy.yml@main
    with:
      project_name: Test
      tf_env_dir: infra/terraform/envs/dev
      aws_region: ap-northeast-1
      branch_env: dev
      aws_role_arn: arn:aws:iam::237710157750:role/gha-terraform-deploy-dev